{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Blog Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body class="container mt-4">

<h1 class="text-center mb-4">📰 Mon Blog Django</h1>

<a href="{% url 'article_create' %}" class="btn btn-primary mb-3">Ajouter un article</a>

<div class="row">
{% for article in object_list %}
    <div class="col-md-4">
        <div class="card mb-4 shadow">
            {% if article.image %}
                <img src="{{ article.image.url }}" class="card-img-top">
            {% endif %}
            <div class="card-body">
                <h5>{{ article.titre }}</h5>
                <p>{{ article.auteur }}</p>
                <a href="{% url 'article_detail' article.pk %}" class="btn btn-success">Lire</a>
            </div>
        </div>
    </div>
{% endfor %}
</div>

</body>
</html>
